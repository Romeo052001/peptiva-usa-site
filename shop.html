<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
<title>Products — Peptiva USA</title>
<meta name="description" content="Browse Peptiva USA pre-filled peptide pens for licensed clinical practices — metabolic, recovery, longevity and aesthetic protocols. COA on every batch.">
</head>
<body>
<div id="site-header"></div>

<section class="phero">
  <div class="phero__bg"><img src="assets/img/lab.jpg" alt=""></div>
  <div class="container">
    <p class="breadcrumb"><a href="index.html">Home</a> / <span>Products</span></p>
    <span class="eyebrow" style="margin-top:14px;display:inline-block">The catalog</span>
    <h1>Stacks for every indication</h1>
    <p class="lead">Pre-filled pens for the protocols your patients are already searching for — standardized, documented and third-party tested.</p>
  </div>
</section>

<section class="section">
  <div class="container shop-layout">
    <aside class="filters">
      <h4>Category</h4>
      <div class="filter-group">
        <button class="filter-btn active" data-cat="all">All products</button>
        <button class="filter-btn" data-cat="metabolic">Metabolic &amp; Weight</button>
        <button class="filter-btn" data-cat="recovery">Recovery &amp; Repair</button>
        <button class="filter-btn" data-cat="longevity">Longevity &amp; Cellular</button>
        <button class="filter-btn" data-cat="aesthetic">Aesthetic &amp; Skin</button>
      </div>
      <div style="margin-top:24px;border-top:1px solid var(--line);padding-top:20px">
        <h4>Need help?</h4>
        <p style="font-size:13.5px;color:var(--muted);margin-bottom:14px">Request wholesale pricing and sample availability.</p>
        <a class="btn btn--primary btn--sm btn--block" href="contact.html">Request Access</a>
      </div>
    </aside>
    <div>
      <div class="shop-bar"><span class="count" id="shop-count"></span></div>
      <div class="grid grid-3" id="shop-grid"></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="assets/js/logo.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
